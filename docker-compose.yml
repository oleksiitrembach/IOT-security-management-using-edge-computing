name: iot-edge-testbed

services:
  broker:
    image: eclipse-mosquitto:2
    container_name: iot-broker
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-t", "healthcheck", "-m", "ok", "-q", "0"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  edge:
    build: .
    image: iot-testbed
    container_name: iot-edge
    command: python edge_node.py
    environment:
      BROKER_HOST: broker
      DETECTION_LOCATION: ${DETECTION_LOCATION:-edge}
      FREQ_THRESHOLD: ${FREQ_THRESHOLD:-20}
      MAX_PAYLOAD: ${MAX_PAYLOAD:-512}
      WARMUP: ${WARMUP:-30}
      K_SIGMA: ${K_SIGMA:-4.0}
      DATA_DIR: /data
      STATS_INTERVAL: ${STATS_INTERVAL:-0.5}
    volumes:
      - ${DATA_DIR:-./data}:/data
    depends_on:
      broker:
        condition: service_healthy
    # Emulacja ograniczonego urządzenia brzegowego (cgroups) -> pomiar PB3:
    cpus: 1.0
    mem_limit: 512m
    stop_grace_period: 15s

  central:
    build: .
    image: iot-testbed
    container_name: iot-central
    command: python central.py
    environment:
      BROKER_HOST: broker
      DETECTION_LOCATION: ${DETECTION_LOCATION:-edge}
      FREQ_THRESHOLD: ${FREQ_THRESHOLD:-20}
      MAX_PAYLOAD: ${MAX_PAYLOAD:-512}
      WARMUP: ${WARMUP:-30}
      K_SIGMA: ${K_SIGMA:-4.0}
      DATA_DIR: /data
      STATS_INTERVAL: ${STATS_INTERVAL:-0.5}
    volumes:
      - ${DATA_DIR:-./data}:/data
    depends_on:
      broker:
        condition: service_healthy
    stop_grace_period: 15s

  device:
    build: .
    image: iot-testbed
    command: python device_sim.py
    environment:
      BROKER_HOST: broker
      SCENARIO: ${SCENARIO:-mixed}
      RATE: ${RATE:-5}
      DURATION: ${DURATION:-120}
      ANOMALY_RATE: ${ANOMALY_RATE:-0.05}
      FLOOD_BURST: ${FLOOD_BURST:-40}
      PAYLOAD_BYTES: ${PAYLOAD_BYTES:-1024}
      DATA_DIR: /data
    volumes:
      - ${DATA_DIR:-./data}:/data
    depends_on:
      broker:
        condition: service_healthy
    stop_grace_period: 10s
