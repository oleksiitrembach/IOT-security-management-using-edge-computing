# Konfiguracja brokera z TLS + uwierzytelnianie + ACL (scenariusz S5).
# Używana z docker-compose.tls.yml:
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#
# Certyfikaty generuje: ./scripts/gen_certs.sh

# Wyłącz dostęp anonimowy
allow_anonymous false
password_file /mosquitto/certs/passwd

# ACL (zasada najmniejszych uprawnień)
acl_file /mosquitto/config/acl

# TLS listener
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false

# Logowanie
persistence false
log_dest stdout
