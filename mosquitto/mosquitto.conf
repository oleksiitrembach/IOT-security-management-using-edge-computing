# Konfiguracja brokera dla przebiegu odtwarzalnego (uproszczona).
# Dla scenariusza S6 (kontrola dostepu) wlacz uwierzytelnianie + ACL + TLS:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd
#   acl_file /mosquitto/config/acl
#   listener 8883
#   cafile/certfile/keyfile ...
listener 1883
allow_anonymous true
persistence false
log_dest stdout
